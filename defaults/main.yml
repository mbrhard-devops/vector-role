---
# defaults/main.yml

# Путь установки Vector
vector_path: /opt/vector

# Версия Vector
vector_version: "0.37.1"

# Архитектура: amd64 или aarch64
vector_arch: "{{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else 'aarch64' }}"

# Путь к конфигу
vector_config: /etc/vector/vector.yml

# Путь к данным
vector_data_path: /var/lib/vector

# Управление сервисом
vector_service_state: started
vector_service_enabled: true

# Пользователь и группа для сервиса
vector_user: root
vector_group: root