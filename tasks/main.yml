---
# tasks/main.yml

- name: Create vector directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: "{{ vector_user }}"
    group: "{{ vector_group }}"
  loop:
    - "{{ vector_path }}"
    - "{{ vector_data_path }}"
    - "{{ vector_config | dirname }}"

- name: Download Vector binary
  ansible.builtin.get_url:
    url: "https://packages.vector.dev/vector-{{ vector_version }}-{{ vector_arch }}-unknown-linux-gnu.tar.gz"
    dest: "/tmp/vector-{{ vector_version }}.tar.gz"
    mode: '0644'
  register: download_result
  ignore_errors: true

- name: Extract Vector binary
  ansible.builtin.unarchive:
    src: "/tmp/vector-{{ vector_version }}.tar.gz"
    dest: "{{ vector_path }}"
    remote_src: true
    creates: "{{ vector_path }}/vector"
  when: download_result is succeeded
  failed_when: false

- name: Deploy Vector configuration
  ansible.builtin.template:
    src: vector.yml.j2
    dest: "{{ vector_config }}"
    mode: '0644'

- name: Deploy systemd unit file
  ansible.builtin.template:
    src: vector.service.j2
    dest: /etc/systemd/system/vector.service
    mode: '0644'
  notify: Reload systemd

- name: Ensure Vector service is in desired state
  ansible.builtin.systemd:
    name: vector
    state: "{{ vector_service_state }}"
    enabled: "{{ vector_service_enabled }}"
    daemon_reload: true
  when: 
    - ansible_service_mgr == "systemd"
    - lookup('file', '/run/systemd/system', errors='ignore') is defined
  failed_when: false